<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Abstract architectural forms">
  <defs>
    <linearGradient id="arch-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f3f0" />
      <stop offset="1" stop-color="#dfdbd4" />
    </linearGradient>
    <linearGradient id="arch-shadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d2b28" stop-opacity="0.7" />
      <stop offset="1" stop-color="#0f0f0f" stop-opacity="0.9" />
    </linearGradient>
    <filter id="arch-grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" seed="2" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05" />
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#arch-sky)" />
  <rect width="1600" height="900" filter="url(#arch-grain)" opacity="0.5" />
  <g fill="#0f0f0f" opacity="0.75">
    <rect x="120" y="160" width="360" height="620" rx="12" />
    <rect x="520" y="100" width="260" height="680" rx="12" />
    <rect x="820" y="220" width="320" height="560" rx="12" />
    <rect x="1180" y="140" width="300" height="640" rx="12" />
  </g>
  <g fill="url(#arch-shadow)" opacity="0.7">
    <rect x="170" y="230" width="260" height="480" rx="8" />
    <rect x="560" y="180" width="180" height="540" rx="8" />
    <rect x="860" y="300" width="240" height="400" rx="8" />
    <rect x="1230" y="220" width="200" height="470" rx="8" />
  </g>
  <g stroke="#fdfcfb" stroke-opacity="0.35" stroke-width="2">
    <line x1="0" y1="780" x2="1600" y2="780" />
    <line x1="0" y1="820" x2="1600" y2="820" />
  </g>
</svg>
